# Render Static Site Blueprint
# Mirrors the manual Render dashboard configuration so settings stay in repo.

services:
  - type: web
    name: teacher-appfrontend
    runtime: static
    rootDir: frontend
    # Render's static service uses npm by default. .npmrc handles peer deps;
    # .env.production sets BUILD_PATH=dist and CI=false.
    buildCommand: npm install --no-audit --no-fund && npm run build
    staticPublishPath: dist
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      # NOTE: REACT_APP_BACKEND_URL is not required while the app is UI-only.
      # When the backend is added, uncomment and set the production URL.
      # - key: REACT_APP_BACKEND_URL
      #   value: https://your-backend.example.com
    headers:
      - path: /static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # SPA fallback — every unknown path serves index.html
      - type: rewrite
        source: /*
        destination: /index.html
