# Render Static Site Blueprint
# Render auto-detects this file and provisions the service accordingly.
# Do NOT change the values in Render's dashboard — keep them in this file.

services:
  - type: web
    name: mosaytra-frontend
    runtime: static
    rootDir: frontend
    # Force CI=false so CRA does not treat ESLint warnings as errors.
    # --network-timeout helps when the registry / tarballs are slow.
    buildCommand: yarn install --frozen-lockfile --network-timeout 600000 && CI=false yarn build
    staticPublishPath: build
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: CI
        value: "false"
      - key: GENERATE_SOURCEMAP
        value: "false"
      # NOTE: REACT_APP_BACKEND_URL must be provided in Render dashboard
      # (Environment tab) OR uncomment and set here once the backend URL is final.
      # - key: REACT_APP_BACKEND_URL
      #   value: https://your-backend.example.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # SPA fallback — every unknown path serves index.html
      - type: rewrite
        source: /*
        destination: /index.html
