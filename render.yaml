# Render Static Site Blueprint
# Mirrors the manual Render dashboard configuration so settings stay in repo.

services:
  - type: web
    name: teacher-appfrontend
    runtime: static
    rootDir: frontend
    # Render's static service uses npm by default. .npmrc handles peer deps;
    # .env.production sets BUILD_PATH=dist and CI=false.
    buildCommand: npm install --no-audit --no-fund && npm run build
    staticPublishPath: dist
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      # Production backend URL (Render web service for the FastAPI backend).
      - key: REACT_APP_BACKEND_URL
        value: https://teacher-app-backend-rozd.onrender.com
    headers:
      - path: /static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # SPA fallback — every unknown path serves index.html
      - type: rewrite
        source: /*
        destination: /index.html
